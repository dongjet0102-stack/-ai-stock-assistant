<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 AI 주식 비서</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container chat-layout">
    <header class="glass-header chat-header">
      <h1>AI 주식 비서 📈</h1>
      <p>당신의 자산 증식을 위한 데이터 기반 인사이트</p>
    </header>

    <main class="chat-main">
      <div id="chat-messages" class="chat-messages">
        <!-- AI Welcome Message -->
        <div class="message ai-message">
          <div class="avatar">🤖</div>
          <div class="bubble">
            안녕하세요! 상위 1% 자산 운용사 수준의 인사이트를 제공하는 <b>AI 주식 비서</b>입니다.<br><br>
            궁금한 종목이 있거나, <b>포트폴리오 스크린샷</b>을 업로드해 보세요! 이전 대화를 모두 기억하므로 실시간 뉴스를 물어보실 때 포트폴리오 맞춤형 조언을 해드릴 수 있습니다.
            <div class="quick-actions">
              <button class="quick-btn" onclick="sendQuickMessage('현재 보유중인 포트폴리오 스크린샷이야. 분석 및 리밸런싱 액션 플랜을 제안해줘.')">📸
                포트폴리오 진단 (이미지 첨부 후 클릭)</button>
              <button class="quick-btn"
                onclick="sendQuickMessage('최근 주식 시장에 큰 영향을 미치는 거시경제 뉴스를 요약하고, 앞으로 어떻게 대응해야 할지 내 포트폴리오 상황에 맞춰 알려줘.')">📰
                실시간 이슈 & 맞춤 대응 브리핑</button>
            </div>
          </div>
        </div>
      </div>

      <div class="chat-input-wrapper">
        <div id="image-preview" class="image-preview hidden">
          <img id="preview-img" src="" alt="preview" />
          <button class="remove-img-btn" onclick="removeImage()">✕</button>
        </div>
        <div class="input-row">
          <label for="file-upload" class="upload-btn" title="이미지 업로드">📎</label>
          <input type="file" id="file-upload" accept="image/*" hidden onchange="handleImageSelect(event)">
          <textarea id="chat-input" placeholder="메시지 입력 (이미지 Ctrl+V 붙여넣기, Enter 전송)" rows="1"
            onkeydown="handleEnter(event)"></textarea>
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>

</html>
