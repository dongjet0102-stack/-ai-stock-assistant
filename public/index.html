<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 AI 주식 비서</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container chat-layout">
    <header class="glass-header chat-header">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem;">
        <div>
          <h1>AI 주식 비서 📈</h1>
          <p>당신의 자산 증식을 위한 데이터 기반 인사이트</p>
        </div>
        <!-- 홈으로 돌아가기 버튼 -->
        <button onclick="goHome()" style="
          background: rgba(255,255,255,0.08);
          border: 1px solid rgba(255,255,255,0.2);
          color: var(--text-main);
          border-radius: 10px;
          padding: 0.6rem 1.2rem;
          cursor: pointer;
          font-size: 0.9rem;
          font-family: inherit;
          transition: 0.2s;
          white-space: nowrap;
        " onmouseover="this.style.background='rgba(255,255,255,0.15)'"
          onmouseout="this.style.background='rgba(255,255,255,0.08)'">
          🏠 홈으로
        </button>
      </div>
      <!-- 모델 선택 -->
      <div style="margin-top: 1rem;">
        <select id="model-select" class="glass-input"
          style="padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.9rem; cursor: pointer; width: 100%; max-width: 380px;">
          <option value="gemini-2.5-flash">🚀 플래시 모델 (매우 빠름, 하루 1500회 무료)</option>
          <option value="gemini-2.5-pro">🧠 프로 모델 (심층 분석 전문가, 분당 2회 무료)</option>
        </select>
      </div>
    </header>

    <main class="chat-main">
      <div id="chat-messages" class="chat-messages">

        <!-- Welcome Section -->
        <section id="welcome-section" class="welcome-section" style="margin-bottom: 2rem;">
          <h2 style="text-align:center; font-size:1.5rem; margin-bottom:1.5rem;">무엇을 도와드릴까요?</h2>
          <div class="options-grid">
            <button class="glass-btn" onclick="selectOption('analysis')">
              <span class="icon">🔍</span>
              <span class="text">종목 / 섹터 분석</span>
              <span class="subtext">특정 주식이나 섹터의 전망이 궁금할 때</span>
            </button>
            <button class="glass-btn" onclick="selectOption('portfolio')">
              <span class="icon">📸</span>
              <span class="text">포트폴리오 조언</span>
              <span class="subtext">내 토스증권 화면을 분석해 리밸런싱을 원할 때</span>
            </button>
            <button class="glass-btn" onclick="selectOption('news')">
              <span class="icon">📰</span>
              <span class="text">실시간 뉴스 추천</span>
              <span class="subtext">이번 주 핵심 뉴스와 추천 종목을 보고 싶을 때</span>
            </button>
          </div>
          <div style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
            💡 하단 입력창에 바로 질문하시거나 이미지를 붙여넣어도(Ctrl+V) 대화가 시작됩니다.
          </div>
        </section>

      </div>

      <div class="chat-input-wrapper" style="position: relative;">
        <div id="image-preview" class="image-preview hidden">
          <img id="preview-img" src="" alt="preview" />
          <button class="remove-img-btn" onclick="removeImage()">✕</button>
        </div>
        <div class="input-row">
          <label for="file-upload" class="upload-btn" title="이미지 업로드">📎</label>
          <input type="file" id="file-upload" accept="image/*" hidden onchange="handleImageSelect(event)">
          <textarea id="chat-input" placeholder="메시지 입력 (이미지 Ctrl+V 붙여넣기, Enter 전송)" rows="1"
            onkeydown="handleEnter(event)"></textarea>
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>

</html>
